name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Prepare phone-friendly APK
        run: cp app/build/outputs/apk/debug/app-debug.apk Currant-Black-Atlas.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Currant-Black-Atlas-APK
          path: Currant-Black-Atlas.apk
          if-no-files-found: error

      - name: Publish APK to Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest-debug >/dev/null 2>&1; then
            gh release upload latest-debug Currant-Black-Atlas.apk --clobber
          else
            gh release create latest-debug Currant-Black-Atlas.apk \
              --title "Currant [Black] Atlas — Latest APK" \
              --notes "Latest installable debug build of the Currant [Black] Atlas Android app." \
              --prerelease
          fi
