name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Apply Pulse Atlas UI upgrade
        run: python scripts/apply_pulse_atlas_v102.py

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Prepare phone-friendly APK
        run: cp app/build/outputs/apk/debug/app-debug.apk Pulse-Atlas-v1.0.2.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Pulse-Atlas-v1.0.2-APK
          path: Pulse-Atlas-v1.0.2.apk
          if-no-files-found: error

      - name: Publish APK to Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest-debug >/dev/null 2>&1; then
            gh release upload latest-debug Pulse-Atlas-v1.0.2.apk --clobber
            gh release edit latest-debug \
              --title "Pulse Atlas — Atlas Noir Edition v1.0.2" \
              --notes "Pulse Atlas v1.0.2 introduces Lux, animated ambient signals, a collapsible atlas menu, Nzo’s Fieldbook naming, and a corrected Android themed icon."
          else
            gh release create latest-debug Pulse-Atlas-v1.0.2.apk \
              --title "Pulse Atlas — Atlas Noir Edition v1.0.2" \
              --notes "Pulse Atlas v1.0.2 introduces Lux, animated ambient signals, a collapsible atlas menu, Nzo’s Fieldbook naming, and a corrected Android themed icon." \
              --prerelease
          fi
